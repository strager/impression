---
- name: Deploy Impression
  hosts: impression

  vars:
    node_version: "25.6.1"
    node_sha256: "97eec07e2a43c5a39e4968c1ae554461783914d872c27d856e98d2751094f5be"
    node_tarball: "node-v{{ node_version }}-linux-x64.tar.xz"
    node_dir: "/opt/node-25"

  tasks:
    - name: Download Node.js {{ node_version }}
      ansible.builtin.get_url:
        url: "https://nodejs.org/dist/v{{ node_version }}/{{ node_tarball }}"
        dest: "/opt/{{ node_tarball }}"
        checksum: "sha256:{{ node_sha256 }}"
      become: true

    - name: Extract Node.js {{ node_version }}
      ansible.builtin.unarchive:
        src: "/opt/{{ node_tarball }}"
        dest: /opt
        remote_src: true
        creates: "/opt/node-v{{ node_version }}-linux-x64"
      become: true

    - name: Symlink Node.js install to {{ node_dir }}
      ansible.builtin.file:
        src: "/opt/node-v{{ node_version }}-linux-x64"
        dest: "{{ node_dir }}"
        state: link
      become: true

    - name: Create impression user
      ansible.builtin.user:
        name: impression
        system: true
        create_home: true
        shell: /usr/sbin/nologin
      become: true

    - name: Build frontend locally
      ansible.builtin.command:
        cmd: npm run build
        chdir: "{{ playbook_dir }}/.."
      delegate_to: localhost
      become: false

    - name: Synchronize app files
      ansible.builtin.synchronize:
        src: "{{ playbook_dir }}/../"
        dest: /home/impression/app/
        rsync_opts:
          - "--include=backend/"
          - "--include=backend/**"
          - "--include=shared/"
          - "--include=shared/**"
          - "--include=frontend/"
          - "--include=frontend/dist/"
          - "--include=frontend/dist/**"
          - "--include=frontend/dist-ssr/"
          - "--include=frontend/dist-ssr/**"
          - "--include=package.json"
          - "--include=package-lock.json"
          - "--include=openapi.yaml"
          - "--exclude=*"
        delete: true
      become: true
      become_user: impression
      notify: Restart impression

    - name: Install production npm dependencies
      ansible.builtin.command:
        cmd: "{{ node_dir }}/bin/npm ci --omit=dev"
        chdir: /home/impression/app
      environment:
        PATH: "{{ node_dir }}/bin:{{ ansible_env.PATH }}"
      become: true
      become_user: impression
      notify: Restart impression

    - name: Deploy .env
      ansible.builtin.copy:
        src: "{{ lookup('first_found', [playbook_dir + '/../.env.prod', playbook_dir + '/../.env']) }}"
        dest: /home/impression/app/.env
        mode: "0600"
      become: true
      become_user: impression
      notify: Restart impression

    - name: Install systemd service
      ansible.builtin.template:
        src: impression.service.j2
        dest: /etc/systemd/system/impression.service
        mode: "0644"
      become: true
      notify: Restart impression

    - name: Create empty document root for Apache vhost
      ansible.builtin.file:
        path: /var/www/impression.strager.net
        state: directory
        owner: root
        group: root
        mode: "0755"
      become: true

    - name: Enable Apache proxy_http module
      ansible.builtin.command:
        cmd: a2enmod --quiet proxy_http
      become: true
      notify: Reload Apache

    - name: Deploy Apache vhost config
      ansible.builtin.template:
        src: 004-impression.strager.net.conf.j2
        dest: /etc/apache2/sites-available/004-impression.strager.net.conf
        owner: root
        group: root
        mode: "0644"
      become: true
      notify: Reload Apache

    - name: Enable Apache site
      ansible.builtin.command:
        cmd: a2ensite --quiet 004-impression.strager.net
      become: true
      notify: Reload Apache

    - name: Deploy somecam.strager.net redirect vhost
      ansible.builtin.template:
        src: 004-somecam.strager.net.conf.j2
        dest: /etc/apache2/sites-available/004-somecam.strager.net.conf
        owner: root
        group: root
        mode: "0644"
      become: true
      notify: Reload Apache

    - name: Enable somecam.strager.net redirect vhost
      ansible.builtin.command:
        cmd: a2ensite --quiet 004-somecam.strager.net
      become: true
      notify: Reload Apache

    - name: Enable and start impression service
      ansible.builtin.systemd:
        name: impression
        enabled: true
        state: started
        daemon_reload: true
      become: true

  handlers:
    - name: Reload Apache
      ansible.builtin.service:
        name: apache2
        state: reloaded
      become: true

    - name: Restart impression
      ansible.builtin.systemd:
        name: impression
        state: restarted
        daemon_reload: true
      become: true
